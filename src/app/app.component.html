<main class="app-shell">
  <header class="page-header">
    <h1>🚀 Design System Playground</h1>
    <p>Task 2.1 — Button Component Showcase</p>
  </header>

  <!-- ── Variants ── -->
  <section class="showcase-section">
    <h2>Variants</h2>
    <div class="button-row">
      <ui-button variant="primary">Primary</ui-button>
      <ui-button variant="secondary">Secondary</ui-button>
      <ui-button variant="outline">Outline</ui-button>
    </div>
  </section>

  <!-- ── Sizes ── -->
  <section class="showcase-section">
    <h2>Sizes</h2>
    <div class="button-row align-end">
      <ui-button variant="primary" size="sm">Small</ui-button>
      <ui-button variant="primary" size="md">Medium</ui-button>
      <ui-button variant="primary" size="lg">Large</ui-button>
    </div>
  </section>

  <!-- ── States ── -->
  <section class="showcase-section">
    <h2>States</h2>
    <div class="button-row">
      <ui-button variant="primary">Default</ui-button>
      <ui-button variant="primary" [disabled]="true">Disabled</ui-button>
      <ui-button variant="primary" [loading]="true">Loading</ui-button>
    </div>
  </section>

  <!-- ── Interactive Demo ── -->
  <section class="showcase-section">
    <h2>Interactive Demo</h2>
    <p class="hint">Click the button to see the loading state in action (2s timeout)</p>
    <div class="button-row">
      <ui-button
        variant="primary"
        size="lg"
        [loading]="isLoading()"
        (click)="simulateLoading()"
      >
        Save Changes
      </ui-button>
      <ui-button
        variant="outline"
        size="lg"
        [loading]="isLoading()"
        (click)="simulateLoading()"
      >
        Submit Form
      </ui-button>
    </div>
  </section>

  <router-outlet />
</main>
